version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: nasa_postgres
    restart: always
    environment:
      POSTGRES_DB: nasa_db
      POSTGRES_USER: nasa_admin
      POSTGRES_PASSWORD: admin12345
      # IMPORTANT: avoid lost+found issue (same fix as Kubernetes)
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    platform: linux/amd64
    image: jcloudcodes/django-starts-jupiters-ig:37
    container_name: nasa_web
    command: gunicorn nasa_world.wsgi:application --bind 0.0.0.0:8000
    ports:
      - "8000:8000"
    environment:
      DB_NAME: nasa_db
      DB_USER: nasa_admin
      DB_PASSWORD: admin12345
      DB_HOST: db
      DB_PORT: "5432"
    depends_on:
      - db

volumes:
  postgres_data: